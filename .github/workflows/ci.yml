name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: cd web && bun install --frozen-lockfile
      # scripts/typecheck.sh runs backend (tsconfig.typecheck.json) + web
      # (svelte-kit sync + scoped tsc). Both currently pass, so this is a
      # hard gate.
      - run: bun run typecheck
