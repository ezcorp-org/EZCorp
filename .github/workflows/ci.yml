name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: cd web && bun install --frozen-lockfile
      # Generate SvelteKit's `./$types` codegen so api routes resolve.
      - run: cd web && bunx --bun svelte-kit sync
      # Non-blocking until the audit-flagged baseline of pre-existing tsc
      # errors is paid down. CI surfaces the count so regressions are
      # visible in PRs without breaking the merge gate.
      - run: bun run typecheck
        continue-on-error: true
